<div class="filter-bar">
  <div class="filter-bar__left">
    <label class="toggle">
      <input type="checkbox" [(ngModel)]="live">
      <span class="toggle-slider"></span>
      <span class="toggle-label">Live</span>
    </label>
  </div>
  <div class="filter-bar__right">
    <div class="custom-select" [class.open]="isDropdownOpen" (click)="toggleDropdown()">
      <div class="select-display">
        {{ selectedOption || 'Select an option' }}
        <span class="arrow">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </div>
      <div class="dropdown-content" *ngIf="isDropdownOpen" (click)="$event.stopPropagation()">
        <div class="dropdown-search">
          <svg class="dropdown-search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 21L16.5 16.5M19 11C19 15.4183 15.4183 19 11 19C6.58172 19 3 15.4183 3 11C3 6.58172 6.58172 3 11 3C15.4183 3 19 6.58172 19 11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <input type="text" placeholder="Search" [(ngModel)]="optionSearch" (input)="filterOptions()">
        </div>
        <ul class="options-list">
          <li *ngFor="let option of filteredOptions" (mousedown)="selectOption(option)" [class.selected-option]="option === selectedOption">
            <span>{{ option }}</span>
            <span class="option-check" *ngIf="option === selectedOption">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4.5 9L7.5 12L13.5 6" stroke="#1976d2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </li>
        </ul>
      </div>
    </div>
    <div class="search-input">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 21L16.5 16.5M19 11C19 15.4183 15.4183 19 11 19C6.58172 19 3 15.4183 3 11C3 6.58172 6.58172 3 11 3C15.4183 3 19 6.58172 19 11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <input type="text" placeholder="Search text" [(ngModel)]="searchText">
      <button *ngIf="searchText" (click)="clearSearch()" class="clear-btn">×</button>
    </div>
  </div>
</div>
